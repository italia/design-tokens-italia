description:
  it-IT:
    shortDescription: Sistema di design tokens per definire e applicare in modo
      coerente le scelte visive nelle interfacce digitali.
    longDescription: I design tokens, risorsa ufficiale del Design system Italia,
      rappresentano le scelte visive fondamentali per la progettazione e lo
      sviluppo di interfacce per siti e servizi digitali della Pubblica
      Amministrazione. Definiscono e documentano attributi come colori,
      tipografia, spaziature e dimensioni, consentendo di applicare queste
      decisioni in modo coerente su diverse piattaforme e dispositivi.
      L'utilizzo dei design tokens permette di mantenere un sistema visivo
      scalabile e uniforme, semplificare le decisioni progettuali e facilitare
      l'implementazione di componenti, pattern e template.
    documentation: https://designers.italia.it/design-system/fondamenti/design-tokens/
    features:
      - Definisce in modo centralizzato colori, tipografia, spaziature e
        dimensioni
      - Garantisce coerenza tra progettazione e sviluppo delle interfacce
        digitali
      - Supporta il riutilizzo di decisioni progettuali in elementi e componenti
        diversi
      - Organizza i token in livelli diversi in base al contesto di applicazione
      - Consente l'integrazione dei token nei progetti tramite variabili CSS e
        Sass
